services:
  - type: web
    name: porra-mundial
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: "CI=false npm ci && CI=false npm run build && cd server && npm ci && npm run build"
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: BESOCCER_ENABLED
        value: "false"
